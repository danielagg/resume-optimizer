name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run lint
      - run: bun run build

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: resume-optimizer-darwin-arm64
          - target: bun-darwin-x64
            asset: resume-optimizer-darwin-x64
          - target: bun-linux-arm64
            asset: resume-optimizer-linux-arm64
          - target: bun-linux-x64-baseline
            asset: resume-optimizer-linux-x64
          - target: bun-linux-arm64-musl
            asset: resume-optimizer-linux-arm64-musl
          - target: bun-linux-x64-musl-baseline
            asset: resume-optimizer-linux-x64-musl
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify tag and package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log(require("./package.json").version)')"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          fi
      - name: Build standalone executable
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="${{ matrix.asset }}.gz"
          bun build cli/index.ts \
            --compile \
            --minify \
            --target="${{ matrix.target }}" \
            --define "RESUME_OPTIMIZER_VERSION=\"${version}\"" \
            --define "RESUME_OPTIMIZER_STANDALONE=true" \
            --define "RESUME_OPTIMIZER_ASSET=\"${asset}\"" \
            --outfile "${{ matrix.asset }}"
          gzip -9 "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create checksums
        working-directory: release
        run: sha256sum *.gz > checksums.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release/* \
              --verify-tag \
              --generate-notes \
              --title "Resume Optimizer ${GITHUB_REF_NAME}"
          fi
